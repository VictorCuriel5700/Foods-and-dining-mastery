        .perspective { perspective: 1000px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); }
        .flip-card-back { transform: rotateY(180deg); overflow-y: auto; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-5px); } 40%, 80% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .animate-pop { animation: pop 0.3s ease-in-out; }
        @keyframes flashRed { 0%, 100% { background-color: #ffffff; } 50% { background-color: #fee2e2; } }
        .animate-flash-red { animation: flashRed 0.5s ease-in-out; }
    </style>

        function initAudio() {

        }

        // --- TTS VOICE SETUP ---
        function pronounceWord(word, event) {
            if (event) event.stopPropagation(); 
            if (!('speechSynthesis' in window)) { alert("Sorry, your browser does not support text-to-speech!"); return; }
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US'; utterance.rate = 0.85; utterance.pitch = 1.1; 
            const voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                let selectedVoice = voices.find(v => v.name.includes("Google US English") || v.name.includes("Samantha") || v.name.includes("Aria"));
                if (!selectedVoice) selectedVoice = voices.find(v => v.lang.startsWith('en-US') || v.lang.startsWith('en-GB'));
                if (selectedVoice) utterance.voice = selectedVoice;
            }
            window.speechSynthesis.speak(utterance);
        }

                                    <button onclick="pronounceWord('${item.w.replace(/'/g, "\\'")}', event)" class="p-1 rounded-full bg-blue-500 text-white hover:bg-blue-400 transition-colors focus:outline-none flex-shrink-0" title="Listen">🔊</button>
                                </div>
                                <p class="text-[14px] text-blue-200 font-mono mt-1 tracking-wide">${item.p}</p>
                            </div>
                            <p class="text-center text-lg md:text-xl font-medium leading-relaxed mt-4">${item.m}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderQuizzes(container) {
            let data = JSON.parse(JSON.stringify(quizData[currentCategory]));
            data.sort(() => Math.random() - 0.5);
            let quizContentHTML = '';
            data.forEach((q, idx) => {
                q.o.sort(() => Math.random() - 0.5);
                quizContentHTML += `<div class="quiz-q"><p class="font-semibold text-gray-800 mb-3">${idx + 1}. ${q.q}</p>
                    <div class="flex flex-col sm:flex-row gap-2">
                        ${q.o.map(opt => `<button onclick="checkQuizBtn(this, '${opt === q.a}', 'quiz')" class="flex-1 py-2 px-4 rounded-lg bg-gray-50 border border-gray-200 text-gray-700 hover:bg-blue-50 hover:text-blue-700 transition font-medium text-left sm:text-center">${opt}</button>`).join('')}
                    </div></div>`;
            });
            activityHTMLCache['quiz'] = quizContentHTML;
            container.innerHTML = `<div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 md:p-12" id="activity-container-quiz">
                <div class="flex flex-wrap justify-between items-center border-b border-gray-100 pb-4 mb-10 gap-4">
                    <h2 class="text-3xl font-extrabold text-blue-700">📝 ${currentCategory} Quiz</h2>
                    <button onclick="renderDynamicContent()" class="bg-blue-50 text-blue-700 hover:bg-blue-100 px-5 py-2.5 rounded-xl text-sm font-extrabold transition-all shadow-sm flex items-center gap-2 border border-blue-100">🔄 Shuffle Quiz</button>
                </div>
                <div id="content-quiz" class="space-y-12">${quizContentHTML}</div>
                <div id="footer-quiz" class="hidden mt-10 pt-6 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div class="text-xl font-extrabold text-blue-700">Score: <span id="score-quiz">0</span>/<span id="total-quiz">${data.length}</span></div>
                    <div class="text-green-600 font-bold text-lg animate-pop">🎉 Quiz Completed! Great job!</div>
                    <button onclick="undoActivity('quiz')" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-bold transition flex items-center gap-2 shadow-md">🔄 Try Again (Second Opportunity)</button>
                </div></div>`;
        }

        function renderActivities(container) {
            const data = activitiesData[currentCategory];
            let html = `<div class="space-y-12">`;

            // 1. Match Up
            let words = data.match.map(m => m.w).sort(() => Math.random() - 0.5);
            let meanings = data.match.map(m => m.m).sort(() => Math.random() - 0.5);
            const matchContentHTML = `<div class="flex flex-col md:flex-row gap-4">
                    <div class="flex-1 flex flex-col gap-2">${words.map(w => `<button onclick="handleMatchSelection('word', this, '${w}')" class="match-word p-3 rounded-xl border-2 border-blue-100 bg-blue-50 text-blue-800 font-bold hover:bg-blue-100 transition-all text-left shadow-sm focus:outline-none">${w}</button>`).join('')}</div>
                    <div class="flex-1 flex flex-col gap-2">${meanings.map(m => `<button onclick="handleMatchSelection('meaning', this, '${m.replace(/'/g, "\\'")}')" class="p-3 rounded-xl border-2 border-gray-200 bg-gray-50 text-gray-700 hover:bg-gray-100 transition-all text-sm text-left shadow-sm focus:outline-none">${m}</button>`).join('')}</div>
                </div>`;
            activityHTMLCache['match'] = matchContentHTML;
            html += `<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8" id="activity-container-match">
                <h3 class="text-xl font-bold text-blue-700 mb-4 flex items-center"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm mr-2">1</span> Match Up Game</h3>
                <div id="content-match">${matchContentHTML}</div>
                <div id="footer-match" class="hidden mt-6 pt-4 border-t border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div class="text-lg font-extrabold text-blue-700">Score: <span id="score-match">0</span>/<span id="total-match">${words.length}</span></div>
                    <div class="text-green-600 font-bold animate-pop text-center">🎉 Match Up Completed!</div>
                    <button onclick="undoActivity('match')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold transition flex items-center gap-2 shadow-md">🔄 Try Again (Second Opportunity)</button>
                </div></div>`;

            // 2. Brackets
            const bracketsContentHTML = `<div class="space-y-3">${data.brackets.map((b, idx) => `
                        <div class="bracket-q p-3 bg-gray-50 rounded-lg border border-gray-200 text-gray-800">${b.s1} 
                            <span class="inline-flex items-center mx-1 bg-white border rounded-md shadow-sm overflow-hidden">
                                <button onclick="checkQuizBtn(this, '${b.o[0] === b.a}', 'brackets')" class="px-3 py-1 text-sm hover:bg-blue-50 font-bold text-blue-600 border-r">${b.o[0]}</button>
                                <button onclick="checkQuizBtn(this, '${b.o[1] === b.a}', 'brackets')" class="px-3 py-1 text-sm hover:bg-blue-50 font-bold text-blue-600">${b.o[1]}</button>
                            </span> ${b.s2}</div>`).join('')}</div>`;
            activityHTMLCache['brackets'] = bracketsContentHTML;
            html += `<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8" id="activity-container-brackets">
                <h3 class="text-xl font-bold text-blue-700 mb-4 flex items-center"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm mr-2">2</span> Brackets</h3>
                <div id="content-brackets">${bracketsContentHTML}</div>
                <div id="footer-brackets" class="hidden mt-6 pt-4 border-t border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div class="text-lg font-extrabold text-blue-700">Score: <span id="score-brackets">0</span>/<span id="total-brackets">${data.brackets.length}</span></div>
                    <div class="text-green-600 font-bold animate-pop text-center">🎉 Brackets Completed!</div>
                    <button onclick="undoActivity('brackets')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold transition">🔄 Try Again (Second Opportunity)</button>
                </div></div>`;

            // 3. Fill in Blanks
            const blanksContentHTML = `<div class="space-y-3">${data.blanks.map((b, idx) => `
                        <div class="blank-q p-3 bg-gray-50 rounded-lg border border-gray-200 text-gray-800 flex flex-wrap items-center gap-2">
                            <span>${b.s1}</span>
                            <input type="text" id="blank-${currentCategory}-${idx}" class="border border-gray-300 rounded px-2 py-1 w-24 text-center focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="?">
                            <span>${b.s2}</span>
                            <button onclick="checkBlank('blank-${currentCategory}-${idx}', '${b.a}', this, 'blanks')" class="ml-auto bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-sm font-bold transition">Check</button>
                        </div>`).join('')}</div>`;
            activityHTMLCache['blanks'] = blanksContentHTML;
            html += `<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8" id="activity-container-blanks">
                <h3 class="text-xl font-bold text-blue-700 mb-4 flex items-center"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm mr-2">3</span> Fill in the Blanks</h3>
                <div id="content-blanks">${blanksContentHTML}</div>
                <div id="footer-blanks" class="hidden mt-6 pt-4 border-t border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div class="text-lg font-extrabold text-blue-700">Score: <span id="score-blanks">0</span>/<span id="total-blanks">${data.blanks.length}</span></div>
                    <div class="text-green-600 font-bold animate-pop text-center">🎉 Fill in the Blanks Completed!</div>
                    <button onclick="undoActivity('blanks')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold transition">🔄 Try Again (Second Opportunity)</button>
                </div></div>`;

            // 4. True/False
            const tfContentHTML = `<div class="space-y-3">${data.tf.map((tf, idx) => `
                        <div class="tf-q p-3 bg-gray-50 rounded-lg border border-gray-200 flex flex-col md:flex-row md:items-center justify-between gap-3">
                            <span class="text-gray-800 font-medium">${tf.s}</span>
                            <div class="flex gap-2 shrink-0">
                                <button onclick="checkQuizBtn(this, '${tf.a === true}', 'tf')" class="px-4 py-1 border border-gray-300 rounded bg-white hover:bg-gray-100 text-green-700 font-bold transition">True</button>
                                <button onclick="checkQuizBtn(this, '${tf.a === false}', 'tf')" class="px-4 py-1 border border-gray-300 rounded bg-white hover:bg-gray-100 text-red-700 font-bold transition">False</button>
                            </div>
                        </div>`).join('')}</div>`;
            activityHTMLCache['tf'] = tfContentHTML;
            html += `<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8" id="activity-container-tf">
                <h3 class="text-xl font-bold text-blue-700 mb-4 flex items-center"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm mr-2">4</span> True or False</h3>
                <div id="content-tf">${tfContentHTML}</div>
                <div id="footer-tf" class="hidden mt-6 pt-4 border-t border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div class="text-lg font-extrabold text-blue-700">Score: <span id="score-tf">0</span>/<span id="total-tf">${data.tf.length}</span></div>
                    <div class="text-green-600 font-bold animate-pop text-center">🎉 True or False Completed!</div>
                    <button onclick="undoActivity('tf')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold transition">🔄 Try Again (Second Opportunity)</button>
                </div></div></div>`;

            container.innerHTML = html;
        }

        function triggerConfetti(rect) {
            const x = (rect.left + rect.width / 2) / window.innerWidth;
            const y = (rect.top + rect.height / 2) / window.innerHeight;
            confetti({ particleCount: 50, spread: 60, origin: { x: x, y: y }, colors: ['#4ade80', '#22c55e', '#16a34a', '#818cf8', '#6366f1'] });
        }

        function handleMatchSelection(type, btn, text) {
            if (btn.disabled) return;
            const container = btn.parentElement;
            Array.from(container.children).forEach(child => { if (!child.disabled) child.classList.remove('ring-4', 'ring-blue-400', 'bg-blue-200'); });
            btn.classList.add('ring-4', 'ring-blue-400', 'bg-blue-200');
            if (type === 'word') activeMatchWord = { el: btn, text: text };
            if (type === 'meaning') activeMatchMeaning = { el: btn, text: text };
            checkInteractiveMatch();
        }

        function checkInteractiveMatch() {
            if (activeMatchWord && activeMatchMeaning) {
                const wordData = vocabularyData.find(item => item.w === activeMatchWord.text);
                const wBtn = activeMatchWord.el; const mBtn = activeMatchMeaning.el;
                
                if (wordData && wordData.m === activeMatchMeaning.text) {
                    wBtn.classList.remove('ring-4', 'ring-blue-400', 'bg-blue-200', 'hover:bg-blue-100');
                    wBtn.classList.add('bg-green-500', 'text-white', 'border-green-600', 'opacity-50', 'cursor-not-allowed', 'animate-pop', 'is-correct');
                    wBtn.disabled = true;
                    mBtn.classList.remove('ring-4', 'ring-blue-400', 'bg-blue-200', 'bg-gray-50', 'text-gray-700', 'hover:bg-gray-100');
                    mBtn.classList.add('bg-green-500', 'text-white', 'border-green-600', 'opacity-50', 'cursor-not-allowed', 'animate-pop');
                    mBtn.disabled = true;
                    triggerConfetti(wBtn.getBoundingClientRect()); playCorrect(); checkActivityCompletion('match');
                } else {
                    wBtn.classList.remove('ring-4', 'ring-blue-400', 'bg-blue-200', 'animate-shake');
                    mBtn.classList.remove('ring-4', 'ring-blue-400', 'bg-blue-200', 'animate-shake');
                    void wBtn.offsetWidth; void mBtn.offsetWidth; 
                    wBtn.classList.add('bg-red-200', 'text-red-800', 'border-red-400', 'animate-shake');
                    mBtn.classList.add('bg-red-200', 'text-red-800', 'border-red-400', 'animate-shake');
                    const activityContainer = wBtn.closest('.bg-white');
                    activityContainer.classList.remove('animate-flash-red'); void activityContainer.offsetWidth; activityContainer.classList.add('animate-flash-red');
                    playWrong(); 
                    setTimeout(() => {
                        if (!wBtn.disabled) wBtn.classList.remove('bg-red-200', 'text-red-800', 'border-red-400', 'animate-shake');
                        if (!mBtn.disabled) mBtn.classList.remove('bg-red-200', 'text-red-800', 'border-red-400', 'animate-shake');
                    }, 800);
                }
                activeMatchWord = null; activeMatchMeaning = null;
            }
        }

        function checkQuizBtn(btn, isCorrectStr, activityType) {
            const siblings = btn.parentElement.children;
            for(let s of siblings) { s.disabled = true; s.classList.add('opacity-50', 'cursor-not-allowed'); }
            btn.classList.remove('opacity-50', 'bg-gray-50', 'text-gray-700');
            if(isCorrectStr === 'true') {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600', 'animate-pop', 'is-correct');
                triggerConfetti(btn.getBoundingClientRect()); playCorrect(); 
            } else {
                btn.classList.add('bg-red-500', 'text-white', 'border-red-600', 'animate-shake', 'is-wrong');
                const activityContainer = btn.closest('.bg-white');
                if (activityContainer) { activityContainer.classList.remove('animate-flash-red'); void activityContainer.offsetWidth; activityContainer.classList.add('animate-flash-red'); }
                playWrong(); 
            }
            if (activityType) checkActivityCompletion(activityType);
        }

        function checkBlank(inputId, correctAns, btn, activityType) {
            const input = document.getElementById(inputId);
            if(input.value.trim().toLowerCase() === correctAns.toLowerCase()) {
                input.classList.remove('border-gray-300', 'text-red-600', 'animate-shake');
                input.classList.add('border-green-500', 'bg-green-100', 'text-green-800', 'font-bold', 'animate-pop', 'is-correct');
                input.readOnly = true;
                if(btn) { btn.disabled = true; btn.classList.add('bg-green-500', 'text-white'); triggerConfetti(btn.getBoundingClientRect()); }
                playCorrect(); 
            } else {
                input.classList.remove('animate-shake'); void input.offsetWidth; 
                input.classList.add('border-red-500', 'text-red-600', 'animate-shake', 'is-wrong');
                input.readOnly = true; 
                if(btn) { btn.disabled = true; btn.classList.add('bg-red-500', 'text-white', 'opacity-50', 'cursor-not-allowed'); }
                if(btn) {
                    const activityContainer = btn.closest('.bg-white');
                    if (activityContainer) { activityContainer.classList.remove('animate-flash-red'); void activityContainer.offsetWidth; activityContainer.classList.add('animate-flash-red'); }
                }
                playWrong(); 
            }
            if (activityType) checkActivityCompletion(activityType);
        }

        function checkActivityCompletion(type) {
            const contentDiv = document.getElementById(`content-${type}`);
            if (!contentDiv) return;
            let total = 0, answered = 0, correct = 0;
            if (type === 'match') {
                const words = contentDiv.querySelectorAll('.match-word'); total = words.length;
                words.forEach(w => { if (w.disabled) { answered++; if (w.classList.contains('is-correct')) correct++; }});
            } else if (type === 'brackets' || type === 'tf' || type === 'quiz') {
                const qs = contentDiv.querySelectorAll(type === 'brackets' ? '.bracket-q' : type === 'tf' ? '.tf-q' : '.quiz-q'); total = qs.length;
                qs.forEach(q => { const btns = q.querySelectorAll('button'); const isAnswered = Array.from(btns).some(b => b.disabled); if (isAnswered) { answered++; if (Array.from(btns).some(b => b.classList.contains('is-correct'))) correct++; }});
            } else if (type === 'blanks') {
                const qs = contentDiv.querySelectorAll('.blank-q'); total = qs.length;
                qs.forEach(q => { const input = q.querySelector('input'); if (input && input.readOnly) { answered++; if (input.classList.contains('is-correct')) correct++; }});
            }
            if (total > 0 && answered === total) {
                const footer = document.getElementById(`footer-${type}`); const scoreSpan = document.getElementById(`score-${type}`);
                if (scoreSpan) scoreSpan.innerText = correct; if (footer) footer.classList.remove('hidden');
            }
        }

        function undoActivity(type) {
            const contentDiv = document.getElementById(`content-${type}`);
            if (contentDiv && activityHTMLCache[type]) contentDiv.innerHTML = activityHTMLCache[type];
            const footer = document.getElementById(`footer-${type}`);
            if (footer) footer.classList.add('hidden');
            if (type === 'match') { activeMatchWord = null; activeMatchMeaning = null; }
        }

        function flipCard(element, event) {
            if(event.target.tagName.toLowerCase() === 'button' || event.target.closest('button')) return;
            element.classList.toggle('flipped');
        }

        window.onload = init;
    </script>
</body>
</html>
